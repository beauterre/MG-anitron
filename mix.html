    <script id="assets">
        var canvas = document.getElementById('mainCanvas');
        var ctx = canvas.getContext('2d');
        var feedback = document.getElementById('projectstatus');
        var frameDOM = document.getElementById('frameNum');
       if (feedback) {
            console.log(feedback); // Should show the HTML element
            feedback.innerText = "select project folder"; 
        } else {
            console.error("Could not find element with ID 'projectstatus'");
        }        var fileMap = {}; 
       var assetImages = {}; // filled by sprites..

        var dir = "Ijsselland";
        var sprites = [
            {name:'mannetje', x:0, y:0, url:'video/mannetje.png'}, 
            {name:'vrouwtje', x:0, y:0, url:'video/vrouwtje.png'}, 
            {name:'chat', x:0, y:0, url:'video/ook-via-chat.png'}, 
            {name:'sense', x:0, y:0, url:'video/sense-info.png'},

        ];

        document.getElementById('folderInput').addEventListener('change', function(e) {
            var files = e.target.files;
            fileMap = {};
            for (var i = 0; i < files.length; i++) {
                var file = files[i];
                fileMap[file.webkitRelativePath] = file;
            }
            feedback.innerHtml = "Loading.. " + files.length + " files. Preloading assets...";
            preloadAssets();

       async function preloadAssets() {
    var error = "";
    for (var i = 0; i < sprites.length; i++) {
        var sprite = sprites[i];
        var path = Object.keys(fileMap).find(function(p) {
            return p.indexOf(sprite.url) !== -1;
        });
        
        if (path) {
            assetImages[sprite.name] = await loadImage(fileMap[path]);
            // FIX: Use innerHTML (caps)
            feedback.innerHTML = "Loaded: " + sprite.name;
        } else {
            console.warn("Asset not found: " + sprite.url);
            error = "Asset not found: " + sprite.url;
            console.log("error is now: " + error);
            // FIX: Use innerHTML and straight quotes ''
            feedback.innerHTML = "<p style='color: red;'>Asset not found: " + sprite.url + "</p>";
        }
    }

    console.log("Final error check: " + error + " (length: " + error.length + ")");

    // FIX: Logic was inverted. If length is 0, it means NO errors.
    if (error.length === 0) {
        feedback.innerText = "Assets loaded. Ready.";
		// show the currentframe
		loadFrame();
//		var noFolder=document.getElementById("no folder");
//		noFolder.style.display="none";
		var videoControls=document.getElementById("video-controls");
		videoControls.style.opacity=1;
    } else {
        // FIX: Use innerHTML and straight quotes ''
        feedback.innerHTML = "<p style='color: red;'>" + error + "</p>";
    }
}


        function loadImage(file) {
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() { resolve(img); };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function drawSprite(spriteName, x, y, scale) {
            if (scale === undefined) scale = 1;
            var img = assetImages[spriteName];
            var config = sprites.find(function(s) { return s.name === spriteName; });
            
            if (!img || !config) return;

            var drawX = x - (config.x * scale);
            var drawY = y - (config.y * scale);
            var drawW = img.width * scale;
            var drawH = img.height * scale;

            ctx.drawImage(img, drawX, drawY, drawW, drawH);
        }

		function nextFrame() {
            var frameVal = document.getElementById('frameNum').value;
			frameVal++;
			frameDOM.value=frameVal;
			loadFrame();
		}
		function prevFrame() {
            var frameVal = document.getElementById('frameNum').value;
			frameVal--;
			frameDOM.value=frameVal;
			loadFrame();
		}
        async function loadFrame() {
            var frameVal = document.getElementById('frameNum').value;
            var paddedFrame = frameVal.toString().padStart(4, '0');

            try {
                var videoSearch = "video/prod" + paddedFrame + ".png";
                var videoPath = Object.keys(fileMap).find(function(p) {
                    return p.indexOf(videoSearch) !== -1;
                });

                if (!videoPath) throw new Error("Video frame " + videoSearch + " not found");
                var videoImg = await loadImage(fileMap[videoPath]);

                var witPath = Object.keys(fileMap).find(function(p) {
                    return p.indexOf('wit.png') !== -1;
                });
                var witImg = witPath ? await loadImage(fileMap[witPath]) : null;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.drawImage(videoImg, 0, 0, 1920, 1080);
                if (witImg) ctx.drawImage(witImg, 0, 0);
            } catch (err) {
                alert(err.message);
                console.error(err);
            }

		}
        async function renderFrame() {
            var frameVal = document.getElementById('frameNum').value;
            var paddedFrame = frameVal.toString().padStart(4, '0');

            try {
                var videoSearch = "video/prod" + paddedFrame + ".png";
                var videoPath = Object.keys(fileMap).find(function(p) {
                    return p.indexOf(videoSearch) !== -1;
                });

                if (!videoPath) throw new Error("Video frame " + videoSearch + " not found");
                var videoImg = await loadImage(fileMap[videoPath]);

                var witPath = Object.keys(fileMap).find(function(p) {
                    return p.indexOf('wit.png') !== -1;
                });
                var witImg = witPath ? await loadImage(fileMap[witPath]) : null;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.drawImage(videoImg, 0, 0, 1920, 1080);
                if (witImg) ctx.drawImage(witImg, 0, 0);

                // Examples of drawing sprites
                drawSprite('guide', 0, 0, 1);// draw the guide to pinpoint the rest.
                drawSprite('mannetje', 500, 500, 1.5);
                drawSprite('wolk1', 200, 100, 1.0);
                drawSprite('title', 960, 100, 0.8);

                status.innerText = "Rendered frame " + frameVal + ". Saving...";
                await saveCanvas(canvas, 'overlay', frameVal);

            } catch (err) {
                alert(err.message);
                console.error(err);
            }
        }

        async function saveCanvas(canvas, filename, frameNr) {
            var paddedFrame = frameNr.toString().padStart(4, '0');
            var fullFileName = filename + "_" + paddedFrame + ".png";

            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: fullFileName,
                    types: [{
                        description: 'PNG Image',
                        accept: {'image/png': ['.png']},
                    }],
                });

                const writable = await handle.createWritable();
                const blob = await new Promise(function(resolve) {
                    canvas.toBlob(resolve, 'image/png');
                });
                await writable.write(blob);
                await writable.close();
                
                status.innerText = "Successfully saved " + fullFileName;
            } catch (err) {
                console.error(err);
                status.innerText = "Save cancelled or failed.";
            }
        }
    </script>
	
   <script id="timeline visualisation">
	var fpsDOM = document.getElementById('timelineFps');
	var timelineCanvas = document.getElementById('timelineCanvas');
	var tCtx = timelineCanvas.getContext('2d');
	var totalTimelineSeconds = 10; // Default duration
	var viewStart = 0;          // Left edge of viewport in seconds
	var viewEnd = 10;           // Right edge of viewport in seconds
	var isDragging = false;
	var lastMouseX = 0;

	
	function getTypeColor(type) {
		if (!type) return "hsl(0, 0%, 70%)"; // Default grey

		// 1. Simple hash: convert string characters to a number
		var hash = 0;
		for (var i = 0; i < type.length; i++) {
			hash = type.charCodeAt(i) + ((hash << 5) - hash);
		}

		// 2. Use the hash to pick a Hue (0-360)
		var hue = Math.abs(hash % 360);
		
		// 3. Set Saturation to 35% and Lightness to 65% for pleasant, desaturated tones
		return "hsl(" + hue + ", 35%, 65%)";
	}

function drawTimeline() {
    var w = timelineCanvas.width;
    var h = timelineCanvas.height;
    var viewDuration = viewEnd - viewStart;
    var fps = parseInt(fpsDOM.value) || 30;
    var frameDuration = 1 / fps;
    
    tCtx.clearRect(0, 0, w, h);

   // --- 0. DRAW NEGATIVE TIME OVERLAY ---
    // If the viewport start is negative, we need to highlight the "void"
    if (viewStart < 0) {
        // Calculate where 0 seconds is on the current X axis
        // Formula: (0 - viewStart) / viewDuration * width
        var zeroX = (-viewStart / viewDuration) * w;
        
        // Only draw if 0 is actually within the current view
        if (zeroX > 0 && zeroX < w) {
            tCtx.fillStyle = "rgba(0, 0, 0, 0.4)"; // Semi-transparent black
            tCtx.fillRect(0, 0, zeroX, h);
            
            // Optional: Add a bright "Zero Line" to clearly separate the zones
            tCtx.strokeStyle = "#888"; 
            tCtx.lineWidth = 2;
            tCtx.beginPath();
            tCtx.moveTo(zeroX, 0);
            tCtx.lineTo(zeroX, h);
            tCtx.stroke();
        } else if (viewEnd < 0) {
            // Entire view is in the negative zone
            tCtx.fillStyle = "rgba(0, 0, 0, 0.6)"; 
            tCtx.fillRect(0, 0, w, h);
        }
    }

    // --- 1. FRAME LINES (Keep your existing purple logic here) ---
    if (viewDuration < 2) {
        tCtx.strokeStyle = "#f3f";
        tCtx.lineWidth = 1;
        var firstFrameIdx = Math.ceil(viewStart / frameDuration);
        var lastFrameIdx = Math.floor(viewEnd / frameDuration);
        for (var f = firstFrameIdx; f <= lastFrameIdx; f++) {
            var x = ((f * frameDuration - viewStart) / viewDuration) * w;
            tCtx.beginPath(); tCtx.moveTo(x, 0); tCtx.lineTo(x, h); tCtx.stroke();
        }
    }

    // --- 2. DYNAMIC SECOND/MINUTE MARKERS ---
    // Calculate the best interval to avoid crowding
    var interval = 1; 
    if (viewDuration > 10) interval = 5;
    if (viewDuration > 60) interval = 10;
    if (viewDuration > 300) interval = 60; // 5 minutes
    if (viewDuration > 1800) interval = 300; // 30 minutes
    if (viewDuration > 3600) interval = 3600; // 1 hour
    
    // If zoomed in very close, use smaller intervals
    if (viewDuration < 5) interval = 0.5;
    if (viewDuration < 2) interval = 0.1;

    tCtx.strokeStyle = "#555";
    tCtx.fillStyle = "#888";
    tCtx.font = "10px Arial";
    tCtx.lineWidth = 2;

    // Align the first marker to the grid (e.g., if interval is 5, markers at 0, 5, 10...)
    var firstMarker = Math.ceil(viewStart / interval) * interval;
    
    for (var i = firstMarker; i <= viewEnd; i += interval) {
        var x = ((i - viewStart) / viewDuration) * w;
        tCtx.beginPath();
        tCtx.moveTo(x, 0);
        tCtx.lineTo(x, h);
        tCtx.stroke();

        // Formatting the label for readability (Seconds vs Minutes vs Hours)
        var label = i.toFixed(1) + "s";
        if (i >= 3600) {
            label = (i / 3600).toFixed(1) + "h";
        } else if (i >= 60) {
            label = (i / 60).toFixed(1) + "m";
        }
        
        tCtx.fillText(label, x + 2, h - 5);
    }

    // --- 3. UPDATE THE TOP LABELS ---
    
    // Helper function to format seconds into h/m/s
    function formatTime(seconds) {
        if (seconds >= 3600) {
            return (seconds / 3600).toFixed(1) + "h";
        } else if (seconds >= 60) {
            return (seconds / 60).toFixed(1) + "m";
        } else {
            return seconds.toFixed(1) + "s";
        }
    }

    // Update Start Label (Left side)
    var startLabelEl = document.getElementById('startTimeLabel');
    if (startLabelEl) {
        startLabelEl.innerText = formatTime(viewStart);
    }

    // Update End Label (Right side)
    var endLabelEl = document.getElementById('totalTimeLabel');
    if (endLabelEl) {
        endLabelEl.innerText = formatTime(viewEnd);
    }

    // --- 4. DRAW EVENTS (Keep your existing dot logic here) ---
    // ... (The event loop remains the same)
}

// PANNING: Click and Drag
timelineCanvas.addEventListener('mousedown', function(e) {
    isDragging = true;
    lastMouseX = e.clientX;
});

window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    
    var deltaX = e.clientX - lastMouseX;
    var viewDuration = viewEnd - viewStart;
    var secondsPerPixel = viewDuration / timelineCanvas.width;
    
    // Shift the viewport
    var shift = deltaX * secondsPerPixel;
    viewStart -= shift;
    viewEnd -= shift;
    
    lastMouseX = e.clientX;
    drawTimeline();
});

window.addEventListener('mouseup', function() {
    isDragging = false;
});

// ZOOMING: Mouse Wheel
timelineCanvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    
    var zoomIntensity = 0.1;
    var delta = e.deltaY > 0 ? 1 + zoomIntensity : 1 - zoomIntensity;
    
    // Zoom centered on mouse position
    var rect = timelineCanvas.getBoundingClientRect();
    var mouseX = e.clientX - rect.left;
    var mouseTime = viewStart + (mouseX / timelineCanvas.width) * (viewEnd - viewStart);
    
    var newDuration = (viewEnd - viewStart) * delta;
    
// Prevent zooming in too far (0.1s), 
// but allow zooming out up to 24 hours (86400s)
if (newDuration < 0.1 || newDuration > 86400) return;

    // Redistribute duration around the mouseTime
    var ratio = mouseX / timelineCanvas.width;
    viewStart = mouseTime - (ratio * newDuration);
    viewEnd = viewStart + newDuration;
    
    drawTimeline();
}, { passive: false });

// Handle clicking on the timeline to select an event
// even when zoomed in..
timelineCanvas.addEventListener('mousedown', function(e) {
    // 1. Start the dragging state (for panning)
    isDragging = true;
    var lastMouseXAtStart = e.clientX; 

    var rect = timelineCanvas.getBoundingClientRect();
    var mouseX = e.clientX - rect.left;
    var scaleX = timelineCanvas.width / rect.width;
    var actualX = mouseX * scaleX;
    
    // --- THE KEY CHANGE IS HERE ---
    // Instead of totalTimelineSeconds, we calculate based on the current view
    var viewDuration = viewEnd - viewStart;
    var clickedTime = viewStart + (actualX / timelineCanvas.width) * viewDuration;
    // ------------------------------
    
    // Find the closest event within a small threshold
    // We make the threshold relative to the zoom level so it feels consistent
    var closestIndex = -1;
    var minDiff = viewDuration * 0.05; // 5% of current view width
    
    for (var i = 0; i < timelineEvents.length; i++) {
        var diff = Math.abs(timelineEvents[i].time - clickedTime);
        if (diff < minDiff) {
            minDiff = diff;
            closestIndex = i;
        }
    }
    
    if (closestIndex !== -1) {
        currentEventIndex = closestIndex;
        updateEditor();
        drawTimeline();
    }
    
    // Store the X for the move event to track panning
    lastMouseX = e.clientX;
});

	
    </script>
   <script id="json crud">
   
   // Event Management State
var currentEventIndex = -1;
var timelineEvents = []; // This will hold your JSON event array

function eventPrev() {
    if (currentEventIndex > 0) {
        currentEventIndex--;
        updateEditor();
		drawTimeline();
    }
}

function eventNext() {
    if (currentEventIndex < timelineEvents.length - 1) {
        currentEventIndex++;
        updateEditor();
		drawTimeline();
    }
}

function eventAdd() {
    var newEvent = { time: 0, type: "move", target: "sprite1", params: {} };
    timelineEvents.push(newEvent);
    currentEventIndex = timelineEvents.length - 1;
    updateEditor();
	drawTimeline();
}

function updateEditor() {
    var editor = document.getElementById('jsonEditor');
    var status = document.getElementById('eventStatus');
    if (currentEventIndex === -1) {
        editor.value = "";
        status.innerText = "No event selected";
    } else {
        var evt = timelineEvents[currentEventIndex];
        // Pretty print the JSON with 4 spaces
        editor.value = JSON.stringify(evt, null, 4);
        status.innerText = "Editing Event #" + (currentEventIndex + 1);
    }
}

function applyEventChange() {
    try {
        var updatedEvent = JSON.parse(document.getElementById('jsonEditor').value);
        timelineEvents[currentEventIndex] = updatedEvent;
		drawTimeline();
        //alert("Event updated successfully!");
    } catch (e) {
        alert("Invalid JSON format! Please check your commas and brackets.");
    }
}

function eventDelete() {
    if (currentEventIndex > -1) {
        timelineEvents.splice(currentEventIndex, 1);
        currentEventIndex = -1;
        updateEditor();
		drawTimeline();
    }
}

   </script>
