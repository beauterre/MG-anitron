    /**
     * switchTab
     * @param {string} tabName - The name of the tab to activate (e.g., 'events', 'sprites')
     */
    function switchTab(tabName) {
        // 1. Hide all sections by removing the 'active' class
        var sections = document.querySelectorAll('.tab-section');
        for (var i = 0; i < sections.length; i++) {
            sections[i].classList.remove('active');
        }
        
        // 2. Deactivate all buttons
        var buttons = document.querySelectorAll('.tab-btn');
        for (var j = 0; j < buttons.length; j++) {
            buttons[j].classList.remove('active');
        }
        
        // 3. Show the selected section and activate its button
        var targetSection = document.getElementById('sec-' + tabName);
        var targetButton = document.getElementById('btn-tab-' + tabName);
        
        if (targetSection && targetButton) {
            targetSection.classList.add('active');
            targetButton.classList.add('active');
        }
        
        // Special Hook: If we switch to sprites, we need to refresh the list
        if (tabName === 'sprites') {
            populateSpriteList();
        }
		if (tabName === 'stage') {
			populateStageList();
		}

    }
</script>
<script id="sprite-editor">
    var currentSelectedSprite = null;

var previewCanvas = document.getElementById('spritePreviewCanvas');
var pCtx = previewCanvas.getContext('2d');

/**
 * updatePreview
 * Draws the selected sprite image and the current anchor point
 */
function updatePreview() {
	console.log("updatePreview called");
    if (!currentSelectedSprite) return;
    
	console.log("for "+currentSelectedSprite.name);
    var img = assetImages[currentSelectedSprite.name];
    if (!img) return;

	console.log("found the img ");
    var cw = previewCanvas.width;
    var ch = previewCanvas.height;
	// create grid of dark and light grey transparancy
	pCtx.fillStyle = "#cccccc"; // Mid grey
	pCtx.fillRect(0, 0, cw, ch);
	pCtx.fillStyle = "#e5e5e5"; // Light grey	
	
    console.log("found the img ");
    var cw = previewCanvas.width;
    var ch = previewCanvas.height;
    var gridSize = 20;

    // 1. Fill the base color (dark grey)
    pCtx.fillStyle = "#888";
    pCtx.fillRect(0, 0, cw, ch);

    // 2. Draw the checkerboard squares (light grey)
    pCtx.fillStyle = "#aaa";
    for (var x = 0; x < cw; x += gridSize) {
        for (var y = 0; y < ch; y += gridSize) {
            // Use the index of the square, not the pixel coordinate
            // (x / 20) gives us 0, 1, 2, 3...
            var gridX = x / gridSize;
            var gridY = y / gridSize;

            // If the sum of the coordinates is even, draw a square
            // This creates the alternating "checker" pattern
            if ((gridX + gridY) % 2 === 0) {
                pCtx.fillRect(x, y, gridSize, gridSize);
            }
        }
    }

    // 1. Calculate "Scale to Fit" (Letterbox)
    var scale = Math.min(cw / img.width, ch / img.height);
    var drawW = img.width * scale;
    var drawH = img.height * scale;
    var offsetX = (cw - drawW) / 2;
    var offsetY = (ch - drawH) / 2;

    // 2. Draw the image
    pCtx.drawImage(img, offsetX, offsetY, drawW, drawH);

    // 3. Draw the Anchor Point
    // We take the sprite's anchor (relative to image) and scale it to the preview
    var anchorX = offsetX + (currentSelectedSprite.x * scale);
    var anchorY = offsetY + (currentSelectedSprite.y * scale);

    // Draw Crosshair
    pCtx.strokeStyle = "red";
    pCtx.fillStyle = "red";
    pCtx.lineWidth = 1;

    // Horizontal line
    pCtx.beginPath();
    pCtx.moveTo(anchorX - 10, anchorY);
    pCtx.lineTo(anchorX + 10, anchorY);
    pCtx.stroke();

    // Vertical line
    pCtx.beginPath();
    pCtx.moveTo(anchorX, anchorY - 10);
    pCtx.lineTo(anchorX, anchorY + 10);
    pCtx.stroke();

    // Center dot
    pCtx.beginPath();
    pCtx.arc(anchorX, anchorY, 3, 0, Math.PI * 2);
    pCtx.fill();
}


    /**
     * populateSpriteList
     * Renders the list of all available sprites in the sidebar
     */
function populateSpriteList() {
console.log("populateSpriteList called");
    var listDiv = document.getElementById('sprite-list');
    if (!listDiv) return;
    
    var searchTerm = document.getElementById('spriteSearch').value.toLowerCase();
    listDiv.innerHTML = "";
    
    // CHANGE 'var i' to 'let i'
    for (let i = 0; i < sprites.length; i++) {
        // CHANGE 'var s' to 'let s'
        let s = sprites[i];
        
        if (s.name.toLowerCase().indexOf(searchTerm) !== -1) {
            var item = document.createElement('div');
            item.className = 'sprite-item';
            
            if (currentSelectedSprite && s.name === currentSelectedSprite.name) {
                item.classList.add('selected');
            }

            item.innerHTML = "<span>" + s.name + "</span> <small>" + s.x + "," + s.y + "</small>";
            
            // Now 's' is locked to the specific sprite for this specific iteration
            item.onclick = function() { 
                selectSprite(s.name); 
            };
            listDiv.appendChild(item);
        }
    }
}

    /**
     * selectSprite
     * Loads a specific sprite's data into the input fields
     */


// Update selectSprite to call updatePreview
function selectSprite(name) {
    var found = sprites.find(function(s) { return s.name === name; });
    if (!found) return;
    
    currentSelectedSprite = found;
    document.getElementById('sprite-prompt').style.display = "none";
    document.getElementById('sprite-inputs').style.display = "block";
    document.getElementById('spriteX').value = currentSelectedSprite.x;
    document.getElementById('spriteY').value = currentSelectedSprite.y;
    document.getElementById('spriteNameDOM').value = found.name;
    
    populateSpriteList();
    updatePreview(); // <--- ADD THIS
	
}


    /**
     * saveSpriteAnchor
     * Writes the input field values back into the global sprites array
     */
// Update saveSpriteAnchor to call updatePreview
function saveSpriteAnchor() {
    if (!currentSelectedSprite) return;
    var newX = parseInt(document.getElementById('spriteX').value);
    var newY = parseInt(document.getElementById('spriteY').value);
    if (isNaN(newX) || isNaN(newY)) return;
    
    currentSelectedSprite.x = newX;
    currentSelectedSprite.y = newY;
    
    populateSpriteList();
    updatePreview(); // <--- ADD THIS
    if (typeof loadFrame === "function") { loadFrame(); }
}</script>

        function loadImage(file) {
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    var img = new Image();
                    img.onload = function() { resolve(img); };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function drawSprite(spriteName, x, y, scale) {
            if (scale === undefined) scale = 1;
			
			
			if (spriteName === "defaultsprite") {
				ctx.fillStyle = "red";
				ctx.strokeStyle = "yellow";
				ctx.lineWidth = 5;
				
				// Draw a 100x100 proxy square
				var size = 100 * scale;
				ctx.fillRect(x, y, size, size);
				ctx.strokeRect(x, y, size, size);
				return; // Exit early; don't try to find an image
			}
            var img = assetImages[spriteName];
            var config = sprites.find(function(s) { return s.name === spriteName; });
            
            if (!img || !config) return;

            var drawX = x - (config.x * scale);
            var drawY = y - (config.y * scale);
            var drawW = img.width * scale;
            var drawH = img.height * scale;

            ctx.drawImage(img, drawX, drawY, drawW, drawH);
        }

		function nextFrame() {
            var frameVal = document.getElementById('frameNum').value;
			frameVal++;
			frameDOM.value=frameVal;
			// Inside your frame change logic or drawTimeline:
			updateStage(); // <--- This does everything
			
			
			drawTimeline();
		}
		function prevFrame() {
            var frameVal = document.getElementById('frameNum').value;
			frameVal--;
			frameDOM.value=frameVal;

			updateStage(); // <--- This does everything
			
			drawTimeline();
		}
        async function loadFrame() {
            var frameVal = document.getElementById('frameNum').value;
            var paddedFrame = frameVal.toString().padStart(4, '0');

            try {
                var videoSearch = "video/prod" + paddedFrame + ".png";
                var videoPath = Object.keys(fileMap).find(function(p) {
                    return p.indexOf(videoSearch) !== -1;
                });

                if (!videoPath) throw new Error("Video frame " + videoSearch + " not found");
                var videoImg = await loadImage(fileMap[videoPath]);

                var witPath = Object.keys(fileMap).find(function(p) {
                    return p.indexOf('wit.png') !== -1;
                });
                var witImg = witPath ? await loadImage(fileMap[witPath]) : null;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.drawImage(videoImg, 0, 0, 1920, 1080);
                if (witImg) ctx.drawImage(witImg, 0, 0);
            } catch (err) {
                alert(err.message);
                console.error(err);
            }

		}
		/* this is for exporting to numbered video frames */
        async function renderFrame() {
            var frameVal = document.getElementById('frameNum').value;
			var fpsVal = parseInt(document.getElementById('timelineFps').value) || 30;
			var currentTime = frameVal / fpsVal;
			
			renderStage();
			// save it..
            var paddedFrame = frameVal.toString().padStart(4, '0');

            try {
                var videoSearch = "video/prod" + paddedFrame + ".png";
                var videoPath = Object.keys(fileMap).find(function(p) {
                    return p.indexOf(videoSearch) !== -1;
                });

                if (!videoPath) throw new Error("Video frame " + videoSearch + " not found");
                var videoImg = await loadImage(fileMap[videoPath]);

                var witPath = Object.keys(fileMap).find(function(p) {
                    return p.indexOf('wit.png') !== -1;
                });
                var witImg = witPath ? await loadImage(fileMap[witPath]) : null;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.drawImage(videoImg, 0, 0, 1920, 1080);
                if (witImg) ctx.drawImage(witImg, 0, 0);

                // Examples of drawing sprites
                drawSprite('guide', 0, 0, 1);// draw the guide to pinpoint the rest.
                drawSprite('mannetje', 500, 500, 1.5);
                drawSprite('wolk1', 200, 100, 1.0);
                drawSprite('title', 960, 100, 0.8);

                status.innerText = "Rendered frame " + frameVal + ". Saving...";
                await saveCanvas(canvas, 'overlay', frameVal);

            } catch (err) {
                alert(err.message);
                console.error(err);
            }
        }

        async function saveCanvas(canvas, filename, frameNr) {
            var paddedFrame = frameNr.toString().padStart(4, '0');
            var fullFileName = filename + "_" + paddedFrame + ".png";

            try {
                const handle = await window.showSaveFilePicker({
                    suggestedName: fullFileName,
                    types: [{
                        description: 'PNG Image',
                        accept: {'image/png': ['.png']},
                    }],
                });

                const writable = await handle.createWritable();
                const blob = await new Promise(function(resolve) {
                    canvas.toBlob(resolve, 'image/png');
                });
                await writable.write(blob);
                await writable.close();
                
                status.innerText = "Successfully saved " + fullFileName;
            } catch (err) {
                console.error(err);
                status.innerText = "Save cancelled or failed.";
            }
        }

			width: 1920, height: 1080
		},
		instances: {} // Key: "mannetje_0", Value: { sprite: "mannetje", x: 100, y: 100, z: 1, visible: true... }
	};
	
	
	function rebuildStageState() {
		// 1. Reset instances to clear the slate for this frame
		stage.instances = {}; 

		var frameVal = parseInt(document.getElementById('frameNum').value) || 0;
		var fpsVal = parseInt(document.getElementById('timelineFps').value) || 30;
		var currentTime = frameVal / fpsVal;

		// 2. Replay all events in chronological order up to now
		timelineEvents.forEach(evt => {
			if (evt.time <= currentTime) {
				applyEventToStage(evt);
			}
		});
	}

	/**
	 * initializeStage
	 * Creates the starting state for all sprites based on the project file
	 */
	function initializeStage() {
		// Start with a completely empty instance list.
		// No library sprites should be here by default.
		stage.instances = {}; 
		
		// We ONLY keep 'video' if you want it as a permanent background 
		// that doesn't need an "enter" event. 
		// Otherwise, even 'video' should be handled by an event.
		stage.instances["video"] = { 
			sprite: "video", 
			visible: false, 
			opacity: 1, 
			scale: 1, 
			x: 0, y: 0, z: 0 
		};
	}

	function createInstanceName(spriteName) {
    // Count how many instances of this specific sprite currently exist
    var count = 0;
    for (var id in stage.instances) {
        if (id.startsWith(spriteName + "_")) {
            count++;
        }
    }
    return spriteName + "_" + count;
}

	
	function drawStageBackground()
	{
		// for now just a white rectangle, can't change that yet
		ctx.fillStyle = "#fff"; 
        ctx.fillRect(0, 0, width, height);

	}
	/* applyEventToStage
	   looping through all events up to the current TIME
	   creates the right state of the animation..
		we encounter a number of events that will be handled in THIS
		function that modifies the stage instance list.
	*/
		
	function applyEventToStage(evt) {
		var instId = evt.instance;
		if (!instId) return;

		if (evt.type === "enter") {
			var spriteName = evt.params.sprite; 
			var spriteDNA = sprites.find(s => s.name === spriteName);
			
			// Logic for naming: if "new", generate "mannetje_0"
			var finalId = instId;
			if (instId === "new") {
				var count = 0;
				for (var id in stage.instances) {
					if (id.startsWith(spriteName + "_")) count++;
				}
				finalId = spriteName + "_" + count;
			}

			stage.instances[finalId] = {
				sprite: spriteName,
				x: evt.params.x !== undefined ? evt.params.x : (spriteDNA ? spriteDNA.x : 0),
				y: evt.params.y !== undefined ? evt.params.y : (spriteDNA ? spriteDNA.y : 0),
				z: evt.params.z !== undefined ? evt.params.z : 0,
				visible: true,
				opacity: 1,
				scale: 1
			};
			evt.instance = finalId; // Permanent assignment
			return;
		}

		var inst = stage.instances[instId];
		if (!inst) return;

		if (evt.type === "leave") inst.visible = false;
		if (evt.type === "move") {
			if (evt.params.x !== undefined) inst.x = evt.params.x;
			if (evt.params.y !== undefined) inst.y = evt.params.y;
			if (evt.params.z !== undefined) inst.z = evt.params.z;
		}
	}

	
	function drawStageInstances() 
	{
		// 1. Convert instances to array for sorting
		var sorted = Object.keys(stage.instances).map(id => {
			return { id: id, ...stage.instances[id] };
		});

		// 2. Sort by Z-index (lowest first)
		sorted.sort((a, b) => (a.z || 0) - (b.z || 0));

		// 3. Render each instance
		sorted.forEach(inst => 
		{
			if (inst.visible && inst.sprite !== "video") 
			{
				ctx.globalAlpha = inst.opacity;
				drawSprite(inst.sprite, inst.x, inst.y, inst.scale);
			}
		});
		ctx.globalAlpha = 1.0;
	}
	
	async function updateStage() {
		// Sequence:
		// 1. Draw the background video frame first
		await loadFrame(); 
		
		// 2. Calculate who is on stage right now
		rebuildStageState(); 
		
		// 3. Draw those instances on top of the video
		drawStageInstances();
		
		// 4. Update the Stage Tab list (if open)
		if (document.getElementById('sec-stage').classList.contains('active')) {
			populateStageList();
		}
	}
	
	function populateStageList() {
		var listDiv = document.getElementById('stage-instance-list');
		if (!listDiv) return;

		var frameVal = parseInt(document.getElementById('frameNum').value) || 0;
		var fpsVal = parseInt(document.getElementById('timelineFps').value) || 30;
		var currentTime = frameVal / fpsVal;

		initializeStage(); 
		timelineEvents.forEach(evt => {
			if (evt.time <= currentTime) {
				applyEventToStage(evt);
			}
		});

		listDiv.innerHTML = "";
		
		// FIX: Get keys from the instances object, NOT the stage root
		var instanceIds = Object.keys(stage.instances); 
		
		if (instanceIds.length === 0) {
			listDiv.innerHTML = "<div class='sprite-item'>No active instances</div>";
			return;
		}

		instanceIds.forEach(id => {
			var inst = stage.instances[id]; 
			if (!inst) return; // Only return if the instance doesn't exist at all

			var item = document.createElement('div');
			item.className = 'sprite-item';
			
			var info = '<span><strong>' + id + '</strong> (' + inst.sprite + ')</span> ' +
					   '<small>z:' + inst.z + ' | x:' + Math.round(inst.x) + ', y:' + Math.round(inst.y) + '</small>';
			
			// Visibility Icon: 👁️ if visible, 🕶️ (or ❌) if invisible
			var eyeIcon = inst.visible ? '👁️' : '🕶️';
			
			var actions = '<div style="display:flex; gap:5px;">' +
						  '<button class="btn-stage-vis" data-id="' + id + '" style="cursor:pointer;">' + eyeIcon + '</button>' +
						  '<button class="btn-stage-edit" data-id="' + id + '" style="cursor:pointer;">✏️</button>' +
						  '<button class="btn-stage-del" data-id="' + id + '" style="cursor:pointer;">❌</button>' +
						  '</div>';

			item.innerHTML = info + actions;

			item.onclick = function(e) {
				if (e.target.tagName === 'BUTTON') return; 
				selectInstanceEvent(id);
			};
			
			listDiv.appendChild(item);

		// Add the new Visibility listener
		document.querySelectorAll('.btn-stage-vis').forEach(btn => {
			btn.onclick = function() {
				var id = this.getAttribute('data-id');
				stageToggleVisibility(id);
			};
		});

		// IMPORTANT: Attach listeners to the buttons AFTER adding them to the DOM
		// because they are added as HTML strings
		document.querySelectorAll('.btn-stage-edit').forEach(btn => {
			btn.onclick = function() {
				var id = this.getAttribute('data-id');
				stageEditInstance(id);
			};
		});

		document.querySelectorAll('.btn-stage-del').forEach(btn => {
			btn.onclick = function() {
				var id = this.getAttribute('data-id');
				stageDeleteInstance(id);
			};
		});	
	}

/**
 * selectInstanceEvent
 * the most recent event that affected this instance 
 * and jumps editor to it.
 */
function selectInstanceEvent(instanceId) {
    // Search timeline backwards (from end to start) to find the last event for this instance
    for (var i = timelineEvents.length - 1; i >= 0; i--) {
        var evt = timelineEvents[i];
        var target = evt.instance;
        
        if (target === instanceId) {
            currentEventIndex = i;
            updateEditor();
            drawTimeline();
            return;
        }
    }
}

   <script id="timeline visualisation">
	var fpsDOM = document.getElementById('timelineFps');
	var timelineCanvas = document.getElementById('timelineCanvas');
	var tCtx = timelineCanvas.getContext('2d');
	var totalTimelineSeconds = 10; // Default duration
	var viewStart = 0;          // Left edge of viewport in seconds
	var viewEnd = 10;           // Right edge of viewport in seconds
	var isDragging = false;
	var lastMouseX = 0;

	
	function getColorFromString(str) {
		if (!str) return "hsl(0, 0%, 70%)"; // Default grey

		// 1. Simple hash: convert string characters to a number
		var hash = 0;
		for (var i = 0; i < str.length; i++) {
			hash = str.charCodeAt(i) + ((hash << 5) - hash);
		}

		// 2. Use the hash to pick a Hue (0-360)
		var hue = Math.abs(hash % 360);
		
		// 3. Set Saturation to 35% and Lightness to 65% for pleasant, desaturated tones
		return "hsl(" + hue + ", 35%, 65%)";
	}

function drawTimeline() 
{
    var w = timelineCanvas.width;
    var h = timelineCanvas.height;
    var viewDuration = viewEnd - viewStart;
    var fps = parseInt(fpsDOM.value) || 30;
    var frameDuration = 1 / fps;
    
    tCtx.clearRect(0, 0, w, h);

    // --- 0. DRAW NEGATIVE TIME OVERLAY ---
    if (viewStart < 0) {
        var zeroX = (-viewStart / viewDuration) * w;
        if (zeroX > 0 && zeroX < w) {
            tCtx.fillStyle = "rgba(0, 0, 0, 0.4)";
            tCtx.fillRect(0, 0, zeroX, h);
            tCtx.strokeStyle = "#888"; 
            tCtx.lineWidth = 2;
            tCtx.beginPath();
            tCtx.moveTo(zeroX, 0);
            tCtx.lineTo(zeroX, h);
            tCtx.stroke();
        } else if (viewEnd < 0) {
            tCtx.fillStyle = "rgba(0, 0, 0, 0.6)"; 
            tCtx.fillRect(0, 0, w, h);
        }
    }

    // --- 1. DRAW FRAME LINES (Purple) ---
    if (viewDuration < 2) {
        tCtx.strokeStyle = "#f3f";
        tCtx.lineWidth = 1;
        var firstFrameIdx = Math.ceil(viewStart / frameDuration);
        var lastFrameIdx = Math.floor(viewEnd / frameDuration);
        for (var f = firstFrameIdx; f <= lastFrameIdx; f++) {
            var frameTime = f * frameDuration;
            var x = ((frameTime - viewStart) / viewDuration) * w;
            tCtx.beginPath(); tCtx.moveTo(x, 0); tCtx.lineTo(x, h); tCtx.stroke();
        }
    }

    // --- 2. DYNAMIC SECOND/MINUTE MARKERS ---
    var interval = 1; 
    if (viewDuration > 10) interval = 5;
    if (viewDuration > 60) interval = 10;
    if (viewDuration > 300) interval = 60;
    if (viewDuration > 1800) interval = 300;
    if (viewDuration > 3600) interval = 3600;
    if (viewDuration < 5) interval = 0.5;
    if (viewDuration < 2) interval = 0.1;

    tCtx.strokeStyle = "#555";
    tCtx.fillStyle = "#888";
    tCtx.font = "10px Arial";
    tCtx.lineWidth = 2;

    var firstMarker = Math.ceil(viewStart / interval) * interval;
    for (var i = firstMarker; i <= viewEnd; i += interval) {
        var x = ((i - viewStart) / viewDuration) * w;
        tCtx.beginPath();
        tCtx.moveTo(x, 0);
        tCtx.lineTo(x, h);
        tCtx.stroke();

        var label = i.toFixed(1) + "s";
        if (i >= 3600) label = (i / 3600).toFixed(1) + "h";
        else if (i >= 60) label = (i / 60).toFixed(1) + "m";
        tCtx.fillText(label, x + 2, h - 5);
    }

    // --- 3. UPDATE THE TOP LABELS ---
    function formatTime(seconds) {
        if (seconds >= 3600) return (seconds / 3600).toFixed(1) + "h";
        if (seconds >= 60) return (seconds / 60).toFixed(1) + "m";
        return seconds.toFixed(1) + "s";
    }
    var startLabelEl = document.getElementById('startTimeLabel');
    if (startLabelEl) startLabelEl.innerText = formatTime(viewStart);
    var endLabelEl = document.getElementById('totalTimeLabel');
    if (endLabelEl) endLabelEl.innerText = formatTime(viewEnd);

    // --- 4. DRAW EVENTS (THE MISSING PART) ---
    for (var j = 0; j < timelineEvents.length; j++) {
        var evt = timelineEvents[j];
        // Draw if the event falls within the current viewport
        if (evt.time >= viewStart && evt.time <= viewEnd) {
            var ex = ((evt.time - viewStart) / viewDuration) * w;
            var ey = h / 2;
            var color = getColorFromString(evt.type);
            tCtx.fillStyle = color;

            if (j === currentEventIndex) {
                // Selected: White halo + colored center
                tCtx.strokeStyle = "white";
                tCtx.lineWidth = 2;
                tCtx.beginPath();
                tCtx.arc(ex, ey, 7, 0, Math.PI * 2);
                tCtx.stroke();
                tCtx.beginPath();
                tCtx.arc(ex, ey, 5, 0, Math.PI * 2);
                tCtx.fill();
                tCtx.fillStyle = "white";
                tCtx.fillText("Selected", ex - 20, ey - 12);
            } else {
                // Regular: Just the colored dot
                tCtx.beginPath();
                tCtx.arc(ex, ey, 4, 0, Math.PI * 2);
                tCtx.fill();
            }
        }
    }

	// draw currentframe indicator.
	var frameVal = parseInt(document.getElementById('frameNum').value) || 0;
	var fpsVal = parseInt(document.getElementById('timelineFps').value) || 30;

	var frameTime = frameVal / fpsVal; 
	// Example: 60 frames / 30 fps = 2.0 seconds

    ex = ((frameTime - viewStart) / viewDuration) * w;
    tCtx.strokeStyle = "white";
    tCtx.lineWidth = 3;
	tCtx.beginPath();
    tCtx.moveTo(ex, 0);
    tCtx.lineTo(ex, h);
    tCtx.stroke();
    
}


// PANNING: Click and Drag
timelineCanvas.addEventListener('mousedown', function(e) {
    isDragging = true;
    lastMouseX = e.clientX;
});

window.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    
    var deltaX = e.clientX - lastMouseX;
    var viewDuration = viewEnd - viewStart;
    var secondsPerPixel = viewDuration / timelineCanvas.width;
    
    // Shift the viewport
    var shift = deltaX * secondsPerPixel;
    viewStart -= shift;
    viewEnd -= shift;
    
    lastMouseX = e.clientX;
    drawTimeline();
});

window.addEventListener('mouseup', function() {
    isDragging = false;
});

// ZOOMING: Mouse Wheel
timelineCanvas.addEventListener('wheel', function(e) {
    e.preventDefault();
    
    var zoomIntensity = 0.1;
    var delta = e.deltaY > 0 ? 1 + zoomIntensity : 1 - zoomIntensity;
    
    // Zoom centered on mouse position
    var rect = timelineCanvas.getBoundingClientRect();
    var mouseX = e.clientX - rect.left;
    var mouseTime = viewStart + (mouseX / timelineCanvas.width) * (viewEnd - viewStart);
    
    var newDuration = (viewEnd - viewStart) * delta;
    
// Prevent zooming in too far (0.1s), 
// but allow zooming out up to 24 hours (86400s)
if (newDuration < 0.1 || newDuration > 86400) return;

    // Redistribute duration around the mouseTime
    var ratio = mouseX / timelineCanvas.width;
    viewStart = mouseTime - (ratio * newDuration);
    viewEnd = viewStart + newDuration;
    
    drawTimeline();
}, { passive: false });

// Handle clicking on the timeline to select an event
// even when zoomed in..
timelineCanvas.addEventListener('mousedown', function(e) {
    // 1. Start the dragging state (for panning)
    isDragging = true;
    var lastMouseXAtStart = e.clientX; 

    var rect = timelineCanvas.getBoundingClientRect();
    var mouseX = e.clientX - rect.left;
    var scaleX = timelineCanvas.width / rect.width;
    var actualX = mouseX * scaleX;
    
    // --- THE KEY CHANGE IS HERE ---
    // Instead of totalTimelineSeconds, we calculate based on the current view
    var viewDuration = viewEnd - viewStart;
    var clickedTime = viewStart + (actualX / timelineCanvas.width) * viewDuration;
    // ------------------------------
    
    // Find the closest event within a small threshold
    // We make the threshold relative to the zoom level so it feels consistent
    var closestIndex = -1;
    var minDiff = viewDuration * 0.05; // 5% of current view width
    
    for (var i = 0; i < timelineEvents.length; i++) {
        var diff = Math.abs(timelineEvents[i].time - clickedTime);
        if (diff < minDiff) {
            minDiff = diff;
            closestIndex = i;
        }
    }
    
    if (closestIndex !== -1) {
        currentEventIndex = closestIndex;
		// set the current time to the time ing this event.
        updateEditor();
        drawTimeline();
    }
    
    // Store the X for the move event to track panning
    lastMouseX = e.clientX;
});

   <script id="json crud">
   
   // Event Management State
var currentEventIndex = -1;
var timelineEvents = []; // This will hold your JSON event array

// keeps next and previous working logically..
function sortTimeline() {
    if (timelineEvents.length === 0) return;

    // 1. Save the reference to the currently selected event
    // We store the actual object reference, not the index
    var selectedEventRef = null;
    if (currentEventIndex !== -1) {
        selectedEventRef = timelineEvents[currentEventIndex];
    }

    // 2. Sort the array by the 'time' property (ascending)
    timelineEvents.sort(function(a, b) {
        return a.time - b.time;
    });

    // 3. Find the new index of the previously selected event
    if (selectedEventRef) {
        currentEventIndex = timelineEvents.indexOf(selectedEventRef);
    }

    // 4. Refresh the UI
    updateEditor();
    drawTimeline();
}



function eventPrev() {
    if (currentEventIndex > 0) {
        currentEventIndex--;
        updateEditor();
		drawTimeline();
    }
}

function eventNext() {
    if (currentEventIndex < timelineEvents.length - 1) {
        currentEventIndex++;
        updateEditor();
		drawTimeline();
    }
}
/* default event is "enter" */
function eventAdd() {
    // 1. Get current time from playhead
    var frameVal = parseInt(document.getElementById('frameNum').value) || 0;
    var fpsVal = parseInt(document.getElementById('timelineFps').value) || 30;
    var frameTime = frameVal / fpsVal; 

    // 2. Define the default sprite to add 
   var defaultSprite = document.getElementById('spriteSelect').value;

    // 3. Calculate the next available instance name (e.g., "mannetje_0")
    // We call the function we created earlier
    var nextInstanceId = createInstanceName(defaultSprite);

    // 4. Create the "enter" event
    var newEvent = { 
        time: frameTime, 
        type: "enter", 
        instance: nextInstanceId, // The generated ID
        params: { 
            sprite: defaultSprite, // The name of the defaultsprite at creation time
            x: stage.width/2,                // Default center screen
            y: stage.height/2, 
            z: 1 
        } 
    };

    timelineEvents.push(newEvent);
    
    // Set the index to the new event and sort
    currentEventIndex = timelineEvents.length - 1; 
    sortTimeline(); 
}



function updateEditor() {
    var editor = document.getElementById('jsonEditor');
    var status = document.getElementById('eventStatus');
    if (currentEventIndex === -1) {
        editor.value = "";
        status.innerText = "No event selected";
    } else {
        var evt = timelineEvents[currentEventIndex];
		// also set the currentframe according to the event time.
		var frameTime = evt.time; // time in seconds (e.g., 2.0)
		var fpsVal = parseInt(document.getElementById('timelineFps').value) || 30;

		// Multiply seconds by the frames per second
		var frameVal = frameTime * fpsVal; 
		// Example: 2.0 seconds * 30 fps = 60 frames
		document.getElementById('frameNum').value=frameVal;
		// Example: 60 frames / 30 fps = 2.0 seconds
		// since we call drawTimeLine after.. this is going to display.
		
        // Pretty print the JSON with 4 spaces
        editor.value = JSON.stringify(evt, null, 4);
        status.innerText = "Editing Event #" + (currentEventIndex + 1);
    }
}

function applyEventChange() {
    try {
        var updatedEvent = JSON.parse(document.getElementById('jsonEditor').value);
        timelineEvents[currentEventIndex] = updatedEvent;
        
        // Since the time might have changed, we MUST re-sort
        sortTimeline(); 
    } catch (e) {
        alert("Invalid JSON format!");
    }
}

function eventDelete() {
    if (currentEventIndex > -1) {
        timelineEvents.splice(currentEventIndex, 1);
        
        // After deleting, we should check if the next event is now the selected one
        // or reset to -1. sortTimeline will handle the array cleanup.
        currentEventIndex = -1; 
        sortTimeline();
    }
}

	<script id="projects">
	/**
 * saveProject
 * Packs events, sprite anchors, and settings into one mega-file
 */
async function saveProject() {
try {
        const handle = await window.showSaveFilePicker({
            suggestedName: 'project_data.ant', // Updated extension
            types: [{
                description: 'Anitron Project File',
                accept: {'application/json': ['.ant']}, // Map JSON format to .ant extension
            }],
        });
		
        // Create the Mega-Object
        const projectData = {
            projectMetadata: {
				version: document.lastModified, // Captures the timestamp of the HTML file
                fps: parseInt(document.getElementById('timelineFps').value) || 30,
                totalDuration: totalTimelineSeconds
            },
            sprites: sprites, // Saves all anchor points (x,y)
            timeline: timelineEvents // Saves all events
        };

        const jsonString = JSON.stringify(projectData, null, 4);
        const writable = await handle.createWritable();
        await writable.write(jsonString);
        await writable.close();
        
        alert("Project saved successfully!");
    } catch (err) {
        console.error("Save failed:", err);
        if (err.name !== 'AbortError') alert("Error saving project: " + err.message);
    }
}

/**
 * loadProject
 * Unpacks the mega-file and restores the entire app state
 */
async function loadProject() {
    try {
        const [fileHandle] = await window.showOpenFilePicker({
            multiple: false,
            types: [{
                description: 'Project File',
				accept: {
					'application/json': ['.json', '.ant'], // Added .ant here
				}            
				}],
        });

        const file = await fileHandle.getFile();
        const content = await file.text();
        const data = JSON.parse(content);
        
   // 1. Restore Project Metadata
        if (data.projectMetadata) {
            // Log the version so you know when this project was created
            console.log("Loading Anitron Project Version (Last Mod): " + (data.projectMetadata.version || "Unknown"));
            
            document.getElementById('timelineFps').value = data.projectMetadata.fps || 30;
            totalTimelineSeconds = data.projectMetadata.totalDuration || 10;
        }
        // 2. Restore Sprites (Anchors)
        if (Array.isArray(data.sprites)) {
            // We map the loaded anchors back to our current sprites list
            data.sprites.forEach(loadedSprite => {
                var localSprite = sprites.find(s => s.name === loadedSprite.name);
                if (localSprite) {
                    localSprite.x = loadedSprite.x;
                    localSprite.y = loadedSprite.y;
                }
            });
        }

        // 3. Restore Timeline
        if (Array.isArray(data.timeline)) {
            timelineEvents = data.timeline;
        }

        // 4. Sync UI
        currentEventIndex = -1;
        sortTimeline();
        updateEditor();
        drawTimeline();
        
        // Refresh the sprite list to show the new anchor coordinates
        if (typeof populateSpriteList === "function") {
            populateSpriteList();
        }
        
        alert("Project loaded successfully!");
    } catch (err) {
        console.error("Load failed:", err);
        if (err.name !== 'AbortError') alert("Error loading project: " + err.message);
    }
}
